# Baseline configuration used when sweeping hyperparameters.
# Do not merge configs/base.yaml here: full-run task_order_files and data_path
# are incompatible with the small HPT tuning dataset (task0, task1, task2).
expt_name: tuning_sweep_CIL
arch: resnet1d
loader: task_incremental_loader
task_order_files: ""

data_path: "data/rff/radar_det_cls/hpt"
dataset: iq
data_scaling: normalize
classes_per_it: 6
iterations: 5000
workers: 0
class_order: random
increment: 5
test_batch_size: 128
samples_per_task: -1
val_rate: 10

cuda: true
amp: false
seed: 0
log_every: 50
log_dir: logs / tuning / individual
tf_dir: ""
calc_test_accuracy: false
state_logging: false

n_meta: 1
inner_steps: 1
temperature: 5
n_epochs: 5
optimizer: sgd
batch_size: 256
replay_batch_size: 64
clipgrad: 5.0
grad_clip_norm: 5.0

# La-MAML parameters
opt_lr: 0.1  # learning rate for LRs
opt_wt: 0.1  # learning rate for weights
alpha_init: 0.001  # initialization for the LRs

# Memory parameters
memories: 5120
n_memories: 5120  # total replay-buffer capacity across all tasks

# Parameters specific to MER
gamma: 1.0  # gamma learning rate parameter
beta: 0.1  # beta learning rate parameter
s: 1.0  # current example learning rate multiplier (s)

# Parameters specific to Meta-BGD
bgd_optimizer: bgd  # Optimizer (choices: [adam, adagrad, bgd, sgd])
optimizer_params: "{}"  # Optimizer parameters
train_mc_iters: 2  # Number of MonteCarlo samples during training (default 10)
std_init: 0.02  # STD init value (default 5e-2)
mean_eta: 50.0  # Eta for mean step (default 1)
fisher_gamma: 0.95  # Fisher gamma

